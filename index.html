<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Enterprise IoT Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        /* Sidebar Menu */
        #sidebar { width: 260px; background-color: #1e293b; padding: 20px; overflow-y: auto; border-right: 1px solid #334155; }
        #sidebar h2 { color: #38bdf8; font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; }
        .sector-title { color: #94a3b8; font-weight: bold; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; font-size: 0.9rem; }
        .machine-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: #e2e8f0; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .machine-btn:hover, .machine-btn.active { background-color: #0284c7; color: white; }
        /* Main Content */
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .header { border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: #38bdf8; }
        /* Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background-color: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        .card h3 { margin-top: 0; color: #94a3b8; font-size: 1rem; }
        .valore { font-size: 3rem; font-weight: bold; }
        /* Terminal Log */
        .terminal { background-color: #000; color: #22c55e; font-family: 'Courier New', Courier, monospace; padding: 15px; border-radius: 5px; height: 150px; overflow-y: auto; }
        .log-line { margin: 5px 0; }
    </style>
</head>
<body>
 
    <div id="sidebar">
        <h2>🏭 Impianti</h2>
        <div id="menu-container">Caricamento menu...</div>
    </div>
 
    <div id="main-content">
        <div class="header">
            <h1 id="titolo-macchina">Seleziona un macchinario</h1>
            <p style="color: #94a3b8;" id="sottotitolo-settore">In attesa di selezione...</p>
        </div>
 
        <div class="grid">
            <div class="card">
                <h3>Efficienza Produzione</h3>
                <div class="valore" id="val-efficienza">--%</div>
            </div>
            <div class="card">
                <h3>Temperatura Motori</h3>
                <div class="valore" id="val-temperatura">--°C</div>
            </div>
            <div class="card" style="grid-column: span 2;">
                <h3>Stato Impianto</h3>
                <div class="valore" id="val-stato" style="font-size: 2rem;">--</div>
            </div>
        </div>
 
        <div class="card" style="grid-column: span 2;">
            <h3>Dati di Log (Live Console)</h3>
            <div class="terminal" id="terminal-logs">
                > In attesa di connessione col macchinario...
            </div>
        </div>
    </div>
 
    <script>
        // Quando la pagina si carica, chiedi al server la struttura dell'azienda per creare il menu
        fetch('/api/struttura')
            .then(res => res.json())
            .then(settori => {
                const menu = document.getElementById('menu-container');
                menu.innerHTML = ''; 
 
                // Crea i bottoni per ogni settore e macchina
                for (const [nomeSettore, macchine] of Object.entries(settori)) {
                    menu.innerHTML += `<div class="sector-title">${nomeSettore}</div>`;
                    macchine.forEach(macchina => {
                        menu.innerHTML += `<button class="machine-btn" onclick="caricaDati('${nomeSettore}', '${macchina}')">${macchina}</button>`;
                    });
                }
            });
 
        // Funzione per caricare i dati quando si clicca un bottone
        function caricaDati(settore, macchina) {
            fetch(`/api/dati/${settore}/${macchina}`)
                .then(res => res.json())
                .then(dati => {
                    document.getElementById('titolo-macchina').innerText = dati.macchinario;
                    document.getElementById('sottotitolo-settore').innerText = "Settore: " + dati.settore;
 
                    document.getElementById('val-efficienza').innerText = dati.efficienza + "%";
                    document.getElementById('val-temperatura').innerText = dati.temperatura + "°C";
 
                    const statoEl = document.getElementById('val-stato');
                    statoEl.innerText = dati.stato;
                    statoEl.style.color = dati.stato.includes("ALLARME") ? "#ef4444" : (dati.stato.includes("MANUTENZIONE") ? "#f59e0b" : "#22c55e");
 
                    // Aggiorna il terminale dei log
                    const terminal = document.getElementById('terminal-logs');
                    terminal.innerHTML = "";
                    dati.logs.forEach(log => {
                        terminal.innerHTML += `<div class="log-line">> ${log}</div>`;
                    });
                });
        }
    </script>
</body>
</html>
