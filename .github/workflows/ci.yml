name: DevSecOps CI Pipeline

#1. github action si avvia ad ogni push su qualsiasi branch
on: [push]

jobs: 
  build-and-scan:
    #girerà su un server ubuntu fornito da github
    runs-on: ubuntu-latest

    steps:
      #2. scarica il codice del repository
      - name: Checkout del codice
        uses: actions/checkout@v4 #è il robot. Equivale a fare git clone del repo

      #3. installa python e bandit per la scansione di sicurezza del codice
      - name: Setup Python e scansione codice (Bandit)
        run: |
          pip install bandit 
          bandit -r main.py #Bandit legge il file python alla ricerca di password in chiaro, funzioni pericolose o falle logiche, tutto questo prima ancora che il codice venga eseguito

      #4. costruzione dell'immagine Docker 
      - name: Build dell'immagine Docker 
        run: docker build -t app-iot-locale:latest . #il robot costruisce la scatola seguendo le istruzioni del Dockerfile e attacca un'etichetta temporanea (app-iot-locale)

      #5. scansione dell'immagine Docker con Trivy
      - name: Scansione vulnerabilità container (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-iot-locale:latest'
          format: 'table'
          exit-code: '1' #se Trivy trova vulnerabilità HIGH o CRITICAL, lancia un codice di errore "1", quindi si ferma e non andrà avanti
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      #6. estrazione della commit da github
      - name: Estrazione hash del commit 
        run: echo "HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV 

      #7. login a docker hub tramite estrazione di credenziali 
      - name: Login su docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #8. spedizione dell'immagine su docker hub
      - name: Tag e push su docker hub
        run: |
          #il robot stacca l'etichetta temporanea (app-iot-locale) e ne attacca due nuove. la prima con il nome del account con la commit unica di github e la seconda con latest, ultima versione disponibile
          docker tag app-iot-locale:latest alessioerco12/iot-dashboard:${{ env.HASH }} 
          docker tag app-iot-locale:latest alessioerco12/iot-dashboard:latest

          docker push alessioerco12/iot-dashboard:${{ env.HASH }}
          docker push alessioerco12/iot-dashboard:latest

      #9. aggiornamento del manifesto nel repository dell'infrastruttura 
      - name: Aggiorna il tag immagine nel repo infrastruttura
        run: |
          #scarica il repo dell'infrastruttura all'interno dell'ambiente temporaneo in cui ta girando GitHub Actions. Usando l'URL con x-access-token e la variabile segreta che ho generato, il robot può accedere al repo senza scrivere password in chiaro
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/alessio1209/infrastruttura-gitops-aws.git
          #spostiammo il terminale del robot all'interno della cartella appena clonata.
          cd infrastruttura-gitops-aws
          #dice a git chi sta effettuando la modifica. è importante perchè bisogna sempre sapere chi fa le modifiche.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          #sed è uno stream editor per manipolare testi. -i modifica il file direttamente nel disco. s|vecchio|nuovo|g cerca una determinata stringa e la sostituisce globalmente
          sed -i "s|image: alessioerco12/iot-dashboard:.*|image: alessioerco12/iot_dashboard:${{ env.HASH }}|g" k8s/base/deployment.yaml
          #effettua add, commit e push. Usiamo il prefisso chore perchè è un'operazione di routine/manutenzione e spinge la modifica sul ramo principale dell'infrastruttura
          git add k8s/base/deployment.yaml
          git commit -m "chore(gitops): aggiornato tag app IoT alla versione ${{ env.HASH }}"
          git push origin main
